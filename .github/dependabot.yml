# Dependabot 自动依赖更新
version: 2
updates:
  # 运行时 + 构建依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    # 自动分组同类更新，减少 PR 数量
    groups:
      runtime-minor:
        patterns:
          - "*"
          - "!@types/*"
        update-types:
          - "minor"
          - "patch"
    # 不自动更新主版本（major）：可能引入破坏性变更，需人工 review
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
      - "automated"