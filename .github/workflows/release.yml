name: Release

# 仅在推送版本 tag 时触发
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ${{ matrix.os }}
    strategy:
      # 因为 electron-builder 在 Linux 上无法签名 macOS / Windows 二进制，
      # 但仍可产出未签名的 .dmg / .exe 草稿
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
              release/*.snap
              release/latest-linux.yml
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: |
              release/*.exe
              release/latest.yml
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/latest-mac.yml

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            if [ -n "${{ inputs.tag }}" ]; then
              TAG="${{ inputs.tag }}"
            else
              TAG="nightly"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build Application
        run: npm run ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 透传 tag 给 electron-builder
          BUILD_VERSION: ${{ steps.tag.outputs.tag }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aela-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 30

      - name: Create / Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          generate_release_notes: true
          draft: true
          # 平铺到 release draft，由人工审阅后再发布
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}